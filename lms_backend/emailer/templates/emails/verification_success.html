{% extends "emails/base_email.html" %}
{% block title %}Email verified{% endblock %}
{% block content %}
    <h1 style="margin:0 0 16px; color:#1e293b; font-size:22px;">You're verified, {{ user.username }}! ✅</h1>
    <p style="margin:0 0 24px; color:#475569; font-size:15px; line-height:1.6;">
    Your email address has been confirmed. Your account is fully set up and ready to go.
    </p>
    <table role="presentation" cellpadding="0" cellspacing="0">
    <tr>
        <td style="border-radius:10px; background:linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); background-color:#3b82f6;">
        <a href="{{ frontend_url }}" style="display:inline-block; padding:14px 28px; color:#ffffff; font-weight:700; font-size:15px; text-decoration:none;">
            Go to LMS
        </a>
        </td>
    </tr>
    </table>
{% endblock %}
