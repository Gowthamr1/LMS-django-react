<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LMS{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#f8fafc; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f8fafc; padding:32px 16px;">
    <tr>
        <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px; background-color:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.07);">

            <!-- Header -->
            <tr>
            <td style="background:linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); background-color:#3b82f6; padding:28px 32px;">
                <span style="color:#ffffff; font-size:22px; font-weight:700;">🎓 LMS</span>
            </td>
            </tr>

            <!-- Body -->
            <tr>
            <td style="padding:32px;">
                {% block content %}{% endblock %}
            </td>
            </tr>

            <!-- Footer -->
            <tr>
            <td style="padding:20px 32px; border-top:1px solid #f1f5f9;">
                <p style="margin:0; color:#94a3b8; font-size:12px; line-height:1.6;">
                You're receiving this email because of activity on your LMS account.
                If this wasn't you, you can safely ignore it.
                </p>
            </td>
            </tr>

        </table>
        </td>
    </tr>
    </table>
</body>
</html>
