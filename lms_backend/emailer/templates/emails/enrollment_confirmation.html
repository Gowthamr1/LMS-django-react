{% extends "emails/base_email.html" %}
{% block title %}Enrollment confirmed{% endblock %}
{% block content %}
    <h1 style="margin:0 0 16px; color:#1e293b; font-size:22px;">You're in! 🎓</h1>
    <p style="margin:0 0 20px; color:#475569; font-size:15px; line-height:1.6;">
    Hi {{ user.username }}, you've successfully enrolled in:
    </p>
    <div style="background-color:#f8fafc; border-left:4px solid #3b82f6; border-radius:8px; padding:16px 20px; margin:0 0 24px;">
    <p style="margin:0; color:#1e293b; font-size:17px; font-weight:700;">{{ course.title }}</p>
    </div>
    <table role="presentation" cellpadding="0" cellspacing="0">
    <tr>
        <td style="border-radius:10px; background:linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); background-color:#3b82f6;">
        <a href="{{ course_url }}" style="display:inline-block; padding:14px 28px; color:#ffffff; font-weight:700; font-size:15px; text-decoration:none;">
            Start Learning
        </a>
        </td>
    </tr>
    </table>
{% endblock %}
